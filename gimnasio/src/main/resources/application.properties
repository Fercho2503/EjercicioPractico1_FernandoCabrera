spring.application.name=gimnasio

#Puerto
server.port=47

#Log formato: dia del mes, hora y minuto
logging.pattern.dateformat=dd/HH:mm

#Banner off
spring.main.banner-mode=off

#Thymeleaf cache
spring.thymeleaf.cache=false

#Conexion MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gimnasio_fitness
spring.datasource.username=usuario_caso_practico_01
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Logs nivel TRACE
logging.level.root=TRACE
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG