<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}">
        <title>Editar Servicio</title>
    </head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>

        <div class="container mt-4">
            <div class="row">
                <div class="col-md-2"></div>
                <div class="col-md-8">
                    <form method="POST" th:action="@{/servicio/guardar}"
                          th:object="${servicio}" class="was-validated">
                        <input type="hidden" name="id" th:field="*{id}"/>
                        <div class="row py-4 mb-4 bg-light">
                            <div class="col-md-4 d-grid">
                                <a th:href="@{/servicio/listado}" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left"></i> Regresar</a>
                            </div>
                            <div class="col-md-4 d-grid">
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-check"></i> Guardar</button>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header"><h4>Actualizar Servicio</h4></div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label>Nombre</label>
                                    <input type="text" class="form-control" name="nombre"
                                           th:field="*{nombre}" required/>
                                </div>
                                <div class="mb-3">
                                    <label>Precio</label>
                                    <input type="number" class="form-control" name="precio"
                                           th:field="*{precio}" step="0.01" required/>
                                </div>
                                <div class="mb-3">
                                    <label>Categoría</label>
                                    <select name="categoriaId" class="form-select" required>
                                        <option th:each="c : ${categorias}"
                                                th:value="${c.id}"
                                                th:text="${c.nombre}"
                                                th:selected="${c.id == servicio.categoria.id}"></option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <section th:replace="~{general/fragmentos :: mostrarToast}"/>
        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
