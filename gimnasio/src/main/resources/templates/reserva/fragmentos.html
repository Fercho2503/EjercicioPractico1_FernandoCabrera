<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>

    <body>
        <!-- Fragmento 1: Agregar reserva -->
        <section th:fragment="agregar">
            <div class='row py-4 mb-2 bg-light'>
                <div class='col-md-1'></div>
                <div class='col-md-3'>
                    <button type="button" class="btn btn-success"
                            data-bs-toggle="modal" data-bs-target="#agregarReservaModal">
                        <i class="fa-solid fa-plus"></i> Agregar Reserva
                    </button>
                </div>
            </div>
            <div class="modal fade" id="agregarReservaModal" tabindex="-1"
                 aria-labelledby="modalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-dark text-white">
                            <h1 class="modal-title fs-5" id="modalLabel">
                                <i class="fa-solid fa-calendar"></i> Agregar Reserva</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <form th:action='@{/reserva/guardar}' th:object='${reserva}'
                              class='was-validated' method="post">
                            <div class="modal-body">
                                <div class='mb-3'>
                                    <label>Nombre del Cliente</label>
                                    <input type="text" name='nombreCliente' class='form-control' required/>
                                </div>
                                <div class='mb-3'>
                                    <label>Fecha</label>
                                    <input type="date" name='fecha' class='form-control' required/>
                                </div>
                                <div class='mb-3'>
                                    <label>Servicio</label>
                                    <select name='servicioId' class='form-select' required>
                                        <option th:each="s : ${servicios}"
                                                th:value="${s.id}"
                                                th:text="${s.nombre}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                    <i class="fa-solid fa-xmark"></i> Cerrar</button>
                                <button type="submit" class="btn btn-success">
                                    <i class="fa-solid fa-floppy-disk"></i> Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

        <!-- Fragmento 2: Listado -->
        <section th:fragment="listado" class="p-3">
            <div class="row p-3">
                <div class="col-md-9">
                    <div class="card p-2">
                        <div class="card-header"><h4>Listado de Reservas</h4></div>
                        <div class="card-body">
                            <div th:if="${reservas != null and !reservas.empty}">
                                <table class="table table-striped table-hover">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Cliente</th>
                                            <th>Fecha</th>
                                            <th>Servicio</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="r : ${reservas}">
                                            <td>[[${r.id}]]</td>
                                            <td>[[${r.nombreCliente}]]</td>
                                            <td>[[${r.fecha}]]</td>
                                            <td>[[${r.servicio.nombre}]]</td>
                                            <td>
                                                <button type="button" class="btn btn-danger btn-sm"
                                                        data-bs-toggle="modal" data-bs-target="#confirmModal"
                                                        th:data-bs-id="${r.id}"
                                                        th:data-bs-nombre="${r.nombreCliente}">
                                                    <i class="fa-solid fa-trash"></i> Eliminar
                                                </button>
                                                <a th:href="@{/reserva/modificar/}+${r.id}" class="btn btn-warning btn-sm">
                                                    <i class="fas fa-pencil-alt"></i> Actualizar
                                                </a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="text-center p-2" th:if="${reservas == null or reservas.empty}">
                                <span>No hay reservas registradas.</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card text-center bg-dark text-white mb-3">
                        <div class="card-body">
                            <h5 class="card-title">Total Reservas</h5>
                            <p class="card-text display-6">[[${totalReservas}]]</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Fragmento 3: Confirmar Eliminar -->
        <section th:fragment="confirmarEliminar">
            <div class="modal fade" id="confirmModal" tabindex="-1"
                 aria-labelledby="confirmModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-danger text-white">
                            <h1 class="modal-title fs-5" id="confirmModalLabel">
                                <i class="fa-solid fa-trash"></i> Eliminar Reserva
                            </h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            ¿Está seguro que desea eliminar la reserva de
                            <strong id="nombreClienteConfirm"></strong>?
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                <i class="fa-solid fa-xmark"></i> Cancelar
                            </button>
                            <form th:action="@{/reserva/eliminar}" method="post">
                                <input type="hidden" name="id" id="idReservaConfirm"/>
                                <button type="submit" class="btn btn-danger">
                                    <i class="fa-solid fa-trash"></i> Eliminar
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <script>
                var confirmModal = document.getElementById('confirmModal');
                confirmModal.addEventListener('show.bs.modal', function (event) {
                    var button = event.relatedTarget;
                    var id = button.getAttribute('data-bs-id');
                    var nombre = button.getAttribute('data-bs-nombre');
                    document.getElementById('idReservaConfirm').value = id;
                    document.getElementById('nombreClienteConfirm').textContent = nombre;
                });
            </script>
        </section>

    </body>
</html>
